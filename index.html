<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Before the World Fades</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            touch-action: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 2;
        }

        #scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
            opacity: 0.7;
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f5f2eb;
            z-index: 10;
            background-color: rgba(10, 10, 10, 0.98);
            transition: opacity 1s ease;
        }

        .screen-content {
            text-align: center;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            letter-spacing: 4px;
            color: #dcd3be;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #a39e93;
        }

        .btn {
            background-color: transparent;
            border: 1px solid #dcd3be;
            color: #dcd3be;
            padding: 12px 30px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: inherit;
        }

        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #a39e93;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        #stage-title {
            font-size: 1rem;
            color: #dcd3be;
            margin-bottom: 5px;
        }

        /* Mobile Joystick Styles */
        #mobile-joystick {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(220, 211, 190, 0.3);
            border-radius: 50%;
            z-index: 15;
            display: none;
            touch-action: none;
        }

        #joystick-knob {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 40px;
            height: 40px;
            background: rgba(220, 211, 190, 0.6);
            border-radius: 50%;
        }

        /* Developer Skip Menu */
        #dev-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #3a3835;
            padding: 8px;
            border-radius: 4px;
        }

        #dev-menu p {
            margin: 0 0 5px 0;
            font-size: 0.65rem;
            color: #8c887f;
        }

        .dev-btn {
            background: #2a2825;
            border: 1px solid #5a5752;
            color: #dcd3be;
            padding: 4px 6px;
            font-size: 0.65rem;
            cursor: pointer;
            margin-right: 2px;
            font-family: inherit;
        }

        #reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background-color: rgba(220, 211, 190, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 4;
            display: none;
        }

        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffd175;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.15s ease-out;
        }

        #subtitles {
            position: absolute;
            bottom: 25%;
            width: 100%;
            text-align: center;
            color: #f5f2eb;
            font-size: 1rem;
            font-style: italic;
            z-index: 10;
            pointer-events: none;
            text-shadow: 1px 1px 3px #000;
            opacity: 0;
            transition: opacity 0.4s ease;
            padding: 0 20px;
            box-sizing: border-box;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="vignette"></div>
    <div id="scanlines"></div>
    <div id="reticle"></div>
    <div id="flash-overlay"></div>
    <div id="subtitles"></div>

    <div id="ui-container">
        <div class="screen-content" id="start-screen">
            <h1>Before the World Fades</h1>
            <p>An abstract exploration of memory decline.<br><br><strong>Controls:</strong><br>PC: WASD to walk, Mouse to look, Click/E to interact.<br>Mobile: Drag left joystick to walk, drag right side of screen to look.</p>
            <button class="btn" id="start-btn">Begin</button>
        </div>
    </div>

    <div id="hud">
        <div id="stage-title">Stage 1: Clear Reverie</div>
        <div id="time-display" style="font-size: 0.8rem;">Time: 00:00</div>
    </div>

    <!-- Mobile Virtual Joystick -->
    <div id="mobile-joystick">
        <div id="joystick-knob"></div>
    </div>

    <div id="dev-menu">
        <p>Skip Stage</p>
        <button class="dev-btn" onclick="skipToStage(1)">1</button>
        <button class="dev-btn" onclick="skipToStage(2)">2</button>
        <button class="dev-btn" onclick="skipToStage(3)">3</button>
        <button class="dev-btn" onclick="skipToStage(4)">4</button>
        <button class="dev-btn" onclick="skipToStage(5)">5</button>
        <button class="dev-btn" onclick="skipToStage(6)">6</button>
    </div>

    <script>
        const STAGE_DURATION = 300; 
        const TOTAL_STAGES = 6;
        let gameTime = 0; 
        let currentStage = 1;
        let isGameRunning = false;
        let isMobile = false;

        // Space characters strictly URL-encoded to %20 to avoid loading breaks
        const AUDIO_FILES = {
            1: "audio/Its%20just%20a%20burning%20memory.m4a",
            2: "audio/A%20losing%20battle%20is%20raging.m4a",
            3: "audio/Back%20there%20Benjamin.m4a",
            4: "audio/Stage%204%20Post%20Awareness%20Confusions.m4a",
            5: "audio/Stage%205%20Advanced%20plaque%20entanglements.m4a",
            6: "audio/Stage%206%20Place%20in%20the%20World%20fades%20away.m4a"
        };

        const STAGE_NAMES = {
            1: "Stage 1: Clear Reverie",
            2: "Stage 2: The First Hesitation",
            3: "Stage 3: Entangled Realities",
            4: "Stage 4: Post-Awareness Static",
            5: "Stage 5: The Great Confusion",
            6: "Stage 6: Terminal Silence"
        };

        const MEMORIES = [
            "We used to walk along the seaside, holding hands...",
            "Where did I put my keys?",
            "Remember the wedding day, the sun was exceptionally bright.",
            "I can smell the coffee brewing, but the kitchen is empty.",
            "Who was that standing in the doorway? She looked familiar...",
            "It is cold. I think it is autumn."
        ];

        let scene, camera, renderer;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let clock = new THREE.Clock();

        let pitch = 0, yaw = 0;
        const mouseSensitivity = 0.002;
        
        const chunks = new Map();
        const chunkSize = 15; 
        let playerGridPos = { x: 999, z: 999 };

        let currentGravity = new THREE.Vector3(0, -1, 0);
        let targetGravity = new THREE.Vector3(0, -1, 0);
        let targetUp = new THREE.Vector3(0, 1, 0);
        let currentUp = new THREE.Vector3(0, 1, 0);

        let materials = {};
        let textures = {};

        // Simplified native audio loop (bypasses browser CORS rules perfectly)
        let audioStream;

        let playerGroup; 
        let focalPoints = [];
        let finalSceneObjects = []; 

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            isMobile = true;
        }

        function initAudio() {
            // No AudioContext or WebAudioAPI is used.
            // Playing directly through HTML5 audio ignores CORS restrictions
            audioStream = new Audio();
        }

        function playStageAudio(stageNum) {
            if (!audioStream) return;

            audioStream.pause();
            audioStream.src = AUDIO_FILES[stageNum];
            audioStream.loop = stageNum !== 6;

            // Handle uncut timestamps
            if (stageNum === 6) {
                audioStream.addEventListener('loadedmetadata', function onMetadata() {
                    audioStream.currentTime = 780; // Seek to 13:00 to catch drone transition [1]
                    audioStream.removeEventListener('loadedmetadata', onMetadata);
                });
            } else {
                audioStream.currentTime = 0;
            }

            // Adjust volume to represent mental decay
            applyAudioDecay(stageNum);

            audioStream.play().catch(e => {
                console.warn("Audio loading issue. Make sure your files are located in the 'audio/' directory.", e);
            });
        }

        function applyAudioDecay(stageNum) {
            if (!audioStream) return;

            // Fade the volume down as stages progress to simulate losing focus
            switch(stageNum) {
                case 1: audioStream.volume = 1.0; break;
                case 2: audioStream.volume = 0.85; break;
                case 3: audioStream.volume = 0.70; break;
                case 4: audioStream.volume = 0.55; break;
                case 5: audioStream.volume = 0.40; break;
                case 6: audioStream.volume = 0.90; break; // Rise in volume during final choir [1]
            }
        }

        function createProceduralTextures() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            // 1. Carpet
            ctx.fillStyle = '#dbcca9';
            ctx.fillRect(0,0,128,128);
            for(let i=0; i<5000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.1)' : 'rgba(80,60,30,0.1)';
                ctx.fillRect(Math.random()*128, Math.random()*128, 2, 2);
            }
            textures.carpet = new THREE.CanvasTexture(canvas);
            textures.carpet.wrapS = THREE.RepeatWrapping;
            textures.carpet.wrapT = THREE.RepeatWrapping;

            // 2. Wallpaper
            const canvasWP = document.createElement('canvas');
            canvasWP.width = 128;
            canvasWP.height = 128;
            const ctxWP = canvasWP.getContext('2d');
            ctxWP.fillStyle = '#f4ecd8';
            ctxWP.fillRect(0,0,128,128);
            ctxWP.fillStyle = '#e8dcb9';
            for(let i=0; i<128; i+=32) {
                ctxWP.fillRect(i, 0, 4, 128);
            }
            textures.wallpaper = new THREE.CanvasTexture(canvasWP);
            textures.wallpaper.wrapS = THREE.RepeatWrapping;
            textures.wallpaper.wrapT = THREE.RepeatWrapping;

            // 3. Concrete
            const canvasC = document.createElement('canvas');
            canvasC.width = 128;
            canvasC.height = 128;
            const ctxC = canvasC.getContext('2d');
            ctxC.fillStyle = '#5c5a56';
            ctxC.fillRect(0,0,128,128);
            for(let i=0; i<6000; i++) {
                ctxC.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
                ctxC.fillRect(Math.random()*128, Math.random()*128, 2, 2);
            }
            textures.concrete = new THREE.CanvasTexture(canvasC);
            textures.concrete.wrapS = THREE.RepeatWrapping;
            textures.concrete.wrapT = THREE.RepeatWrapping;
        }

        function initScene() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.04);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 80);
            
            playerGroup = new THREE.Group();
            playerGroup.position.set(0, 1.8, 0);
            playerGroup.add(camera);
            scene.add(playerGroup);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = false; 
            container.appendChild(renderer.domElement);

            createProceduralTextures();

            materials.carpet = new THREE.MeshPhongMaterial({ map: textures.carpet, shininess: 2 });
            materials.wallpaper = new THREE.MeshPhongMaterial({ map: textures.wallpaper, shininess: 5 });
            materials.concrete = new THREE.MeshPhongMaterial({ map: textures.concrete, shininess: 2 });
            materials.wood = new THREE.MeshPhongMaterial({ color: 0x24160a, shininess: 10 });
            materials.brass = new THREE.MeshPhongMaterial({ color: 0xbfa15f, shininess: 80 });

            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            window.addEventListener('resize', onWindowResize, false);

            if (isMobile) {
                initMobileControls();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const startBtn = document.getElementById('start-btn');
        const uiContainer = document.getElementById('ui-container');

        startBtn.addEventListener('click', () => {
            if (isMobile) {
                uiContainer.style.opacity = 0;
                setTimeout(() => { uiContainer.style.display = 'none'; }, 1000);
                document.getElementById('hud').style.display = 'block';
                document.getElementById('mobile-joystick').style.display = 'block';
                document.getElementById('dev-menu').style.display = 'block';
                
                if (!isGameRunning) {
                    isGameRunning = true;
                    initAudio();
                    playStageAudio(1);
                    clock.getDelta();
                }
            } else {
                document.body.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                uiContainer.style.opacity = 0;
                setTimeout(() => { uiContainer.style.display = 'none'; }, 1000);
                document.getElementById('hud').style.display = 'block';
                document.getElementById('reticle').style.display = 'block';
                document.getElementById('dev-menu').style.display = 'block';
                
                if (!isGameRunning) {
                    isGameRunning = true;
                    initAudio();
                    playStageAudio(1);
                    clock.getDelta();
                }
            } else {
                uiContainer.style.display = 'flex';
                uiContainer.style.opacity = 1;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body || isMobile) return;

            yaw -= e.movementX * mouseSensitivity;
            pitch -= e.movementY * mouseSensitivity;
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
        });

        let touchStartX = 0, touchStartY = 0;
        let isLooking = false;
        let activeLookId = null;

        function initMobileControls() {
            const joystick = document.getElementById('mobile-joystick');
            const knob = document.getElementById('joystick-knob');
            const joyMaxRadius = 60;

            joystick.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = joystick.getBoundingClientRect();
                touchStartX = touch.clientX - rect.left - 60;
                touchStartY = touch.clientY - rect.top - 60;
            }, { passive: false });

            joystick.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = joystick.getBoundingClientRect();
                let x = touch.clientX - rect.left - 60 - touchStartX;
                let y = touch.clientY - rect.top - 60 - touchStartY;

                let dist = Math.sqrt(x*x + y*y);
                if (dist > joyMaxRadius) {
                    x = (x / dist) * joyMaxRadius;
                    y = (y / dist) * joyMaxRadius;
                    dist = joyMaxRadius;
                }

                knob.style.transform = `translate(${x}px, ${y}px)`;

                const nX = x / joyMaxRadius;
                const nY = y / joyMaxRadius;

                moveForward = nY < -0.2;
                moveBackward = nY > 0.2;
                moveLeft = nX < -0.2;
                moveRight = nX > 0.2;
            }, { passive: false });

            joystick.addEventListener('touchend', (e) => {
                knob.style.transform = 'translate(0px, 0px)';
                moveForward = moveBackward = moveLeft = moveRight = false;
            });

            window.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.touches.length; i++) {
                    const t = e.touches[i];
                    if (t.clientX > window.innerWidth / 2) {
                        isLooking = true;
                        activeLookId = t.identifier;
                        touchStartX = t.clientX;
                        touchStartY = t.clientY;
                        break;
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                if (!isLooking) return;
                for (let i = 0; i < e.touches.length; i++) {
                    const t = e.touches[i];
                    if (t.identifier === activeLookId) {
                        let dx = t.clientX - touchStartX;
                        let dy = t.clientY - touchStartY;

                        yaw -= dx * 0.005;
                        pitch -= dy * 0.005;
                        pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
                        camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

                        touchStartX = t.clientX;
                        touchStartY = t.clientY;
                        break;
                    }
                }
            }, { passive: false });

            window.addEventListener('touchend', (e) => {
                let stillLooking = false;
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === activeLookId) {
                        stillLooking = true;
                        break;
                    }
                }
                if (!stillLooking) {
                    isLooking = false;
                    activeLookId = null;
                }
            });
        }

        const onKeyDown = function (event) {
            if (isMobile) return;
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'KeyE': triggerInteraction(); break;
            }
        };

        const onKeyUp = function (event) {
            if (isMobile) return;
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        function getChunkKey(x, z) {
            return `${x},${z}`;
        }

        function createWallSconce(group, x, y, z, rotationY) {
            const sconceGroup = new THREE.Group();
            sconceGroup.position.set(x, y, z);
            sconceGroup.rotation.y = rotationY;

            const armGeom = new THREE.CylinderGeometry(0.015, 0.015, 0.2);
            const arm = new THREE.Mesh(armGeom, materials.brass);
            arm.rotation.x = Math.PI / 2;
            sconceGroup.add(arm);

            const bulbGeom = new THREE.SphereGeometry(0.06, 6, 6);
            const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffeaad });
            const bulb = new THREE.Mesh(bulbGeom, bulbMat);
            bulb.position.set(0, 0, 0.1);
            sconceGroup.add(bulb);

            const lightColor = currentStage >= 3 ? 0xccffea : 0xffe6a3;
            const lightIntensity = currentStage === 4 ? 0.3 : (currentStage === 5 ? 0.15 : 0.8);
            const light = new THREE.PointLight(lightColor, lightIntensity, 8);
            light.position.set(0, 0, 0.12);
            sconceGroup.add(light);

            group.add(sconceGroup);
        }

        function generateCorridorChunk(gx, gz) {
            const group = new THREE.Group();
            group.position.set(gx * chunkSize, 0, gz * chunkSize);

            let floorMat = materials.carpet;
            let wallMat = materials.wallpaper;

            if (currentStage >= 3) {
                wallMat = materials.concrete;
            }
            if (currentStage >= 4) {
                floorMat = materials.concrete;
            }

            // Standard Floor
            if (currentStage < 4) {
                const floorGeom = new THREE.PlaneGeometry(chunkSize, chunkSize);
                const floor = new THREE.Mesh(floorGeom, floorMat);
                floor.rotation.x = -Math.PI / 2;
                group.add(floor);
            } else {
                for(let i = 0; i < 3; i++) {
                    const blockGeom = new THREE.BoxGeometry(4 + Math.random()*3, 0.3, 4 + Math.random()*3);
                    const block = new THREE.Mesh(blockGeom, floorMat);
                    block.position.set(
                        (Math.random() - 0.5) * 6,
                        (Math.random() - 0.5) * 1.5 - 0.3,
                        (Math.random() - 0.5) * 6
                    );
                    block.rotation.y = Math.random() * Math.PI;
                    group.add(block);
                }
            }

            // Ceiling
            if (currentStage < 4) {
                const ceilingGeom = new THREE.PlaneGeometry(chunkSize, chunkSize);
                const ceiling = new THREE.Mesh(ceilingGeom, floorMat); 
                ceiling.rotation.x = Math.PI / 2;
                ceiling.position.y = 3.5;
                group.add(ceiling);
            }

            // Walls (Left & Right)
            if (currentStage < 4) {
                const wallGeom = new THREE.PlaneGeometry(chunkSize, 3.5);
                
                const wallLeft = new THREE.Mesh(wallGeom, wallMat);
                wallLeft.position.set(-chunkSize/2, 1.75, 0);
                wallLeft.rotation.y = Math.PI / 2;
                group.add(wallLeft);

                const wallRight = new THREE.Mesh(wallGeom, wallMat);
                wallRight.position.set(chunkSize/2, 1.75, 0);
                wallRight.rotation.y = -Math.PI / 2;
                group.add(wallRight);

                createWallSconce(group, -chunkSize/2 + 0.05, 2.2, 0, Math.PI/2);
                createWallSconce(group, chunkSize/2 - 0.05, 2.2, 0, -Math.PI/2);
            } else if (currentStage === 5) {
                const colGeom = new THREE.BoxGeometry(10, 60, 10);
                const col = new THREE.Mesh(colGeom, materials.concrete);
                col.position.set((Math.random() - 0.5) * 20, -25, (Math.random() - 0.5) * 20);
                col.rotation.set(Math.random()*0.2, Math.random()*3, Math.random()*0.2);
                group.add(col);
            }

            if (currentStage < 4 && Math.random() > 0.6) {
                spawnFocalPoint(group, gx, gz);
            }

            if (currentStage === 3) {
                const slideGeom = new THREE.BoxGeometry(0.4, 3.5, 5);
                const slideWall = new THREE.Mesh(slideGeom, materials.concrete);
                slideWall.position.set(0, 1.75, (Math.random() - 0.5) * 3);
                slideWall.userData = {
                    type: "sliding",
                    speed: 0.6 + Math.random() * 0.6,
                    range: 3.0,
                    baseX: 0
                };
                group.add(slideWall);
            }

            if (currentStage === 2 || currentStage === 3) {
                const padGeom = new THREE.BoxGeometry(1.8, 0.05, 1.8);
                const padMat = new THREE.MeshBasicMaterial({ color: 0x3d705d, transparent: true, opacity: 0.6 });
                const pad = new THREE.Mesh(padGeom, padMat);
                pad.position.set((Math.random()-0.5)*3, 0.02, (Math.random()-0.5)*3);
                pad.userData = {
                    type: "gravityPad",
                    dir: new THREE.Vector3(
                        Math.random() > 0.5 ? 1 : -1,
                        0,
                        0
                    ).normalize()
                };
                group.add(pad);
            }

            scene.add(group);
            chunks.set(getChunkKey(gx, gz), group);
        }

        function spawnFocalPoint(group, gx, gz) {
            const tableGroup = new THREE.Group();
            tableGroup.position.set((Math.random() - 0.5) * 3, 0, (Math.random() - 0.5) * 3);

            const baseGeom = new THREE.CylinderGeometry(0.25, 0.25, 0.05, 8);
            const base = new THREE.Mesh(baseGeom, materials.wood);
            base.position.y = 0.025;
            tableGroup.add(base);

            const legGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.9, 6);
            const leg = new THREE.Mesh(legGeom, materials.wood);
            leg.position.y = 0.5;
            tableGroup.add(leg);

            const topGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.05, 8);
            const top = new THREE.Mesh(topGeom, materials.wood);
            top.position.y = 0.95;
            tableGroup.add(top);

            const itemGeom = new THREE.DodecahedronGeometry(0.08);
            const itemMat = new THREE.MeshBasicMaterial({ color: 0xffd175, wireframe: true });
            const item = new THREE.Mesh(itemGeom, itemMat);
            item.position.y = 1.1;
            item.userData = {
                type: "artifact",
                id: Math.floor(Math.random() * MEMORIES.length),
                parentChunk: getChunkKey(gx, gz)
            };
            tableGroup.add(item);
            
            focalPoints.push(item);
            group.add(tableGroup);
        }

        function updateChunks() {
            if (currentStage === 6) {
                clearAllChunks();
                return;
            }

            const px = playerGroup.position.x;
            const pz = playerGroup.position.z;

            const cx = Math.floor((px + chunkSize/2) / chunkSize);
            const cz = Math.floor((pz + chunkSize/2) / chunkSize);

            if (cx !== playerGridPos.x || cz !== playerGridPos.y) {
                playerGridPos.x = cx;
                playerGridPos.y = cz;

                const range = 2; 
                const keepSet = new Set();

                for(let x = cx - range; x <= cx + range; x++) {
                    for(let z = cz - range; z <= cz + range; z++) {
                        const key = getChunkKey(x, z);
                        keepSet.add(key);
                        if (!chunks.has(key)) {
                            generateCorridorChunk(x, z);
                        }
                    }
                }

                for (const [key, obj] of chunks.entries()) {
                    if (!keepSet.has(key)) {
                        const chunkPos = obj.position.clone();
                        const toChunk = chunkPos.sub(playerGroup.position);
                        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                        const dot = toChunk.normalize().dot(forward);

                        if (dot < 0.2 || toChunk.length() > 35) {
                            scene.remove(obj);
                            focalPoints = focalPoints.filter(fp => fp.userData.parentChunk !== key);
                            chunks.delete(key);
                        }
                    }
                }
            }
        }

        function clearAllChunks() {
            for (const [key, obj] of chunks.entries()) {
                scene.remove(obj);
            }
            chunks.clear();
            focalPoints = [];
        }

        function initStage6Environment() {
            clearAllChunks();
            scene.fog.color.setHex(0x020202);
            scene.fog.density = 0.03;

            const floorGeom = new THREE.PlaneGeometry(80, 80);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x050505, shininess: 0 });
            const floor = new THREE.Mesh(floorGeom, floorMat);
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);
            finalSceneObjects.push(floor);

            const chairGroup = new THREE.Group();
            chairGroup.position.set(0, 0, -6);

            const legG = new THREE.CylinderGeometry(0.03, 0.03, 0.55, 6);
            for(let x = -0.35; x <= 0.35; x += 0.7) {
                for(let z = -0.35; z <= 0.35; z += 0.7) {
                    const leg = new THREE.Mesh(legG, materials.wood);
                    leg.position.set(x, 0.275, z);
                    chairGroup.add(leg);
                }
            }

            const seatG = new THREE.BoxGeometry(0.9, 0.15, 0.9);
            const cushionMat = new THREE.MeshPhongMaterial({ color: 0x471515, shininess: 1 });
            const seat = new THREE.Mesh(seatG, cushionMat);
            seat.position.y = 0.6;
            chairGroup.add(seat);

            const backG = new THREE.BoxGeometry(0.9, 0.9, 0.15);
            const back = new THREE.Mesh(backG, cushionMat);
            back.position.set(0, 1.05, -0.375);
            chairGroup.add(back);

            const armG = new THREE.BoxGeometry(0.12, 0.12, 0.9);
            const leftArm = new THREE.Mesh(armG, materials.wood);
            leftArm.position.set(-0.42, 0.7, 0);
            const rightArm = new THREE.Mesh(armG, materials.wood);
            rightArm.position.set(0.42, 0.7, 0);
            chairGroup.add(leftArm);
            chairGroup.add(rightArm);

            scene.add(chairGroup);
            finalSceneObjects.push(chairGroup);

            const clockGroup = new THREE.Group();
            clockGroup.position.set(2.5, 0, -5.5);
            clockGroup.rotation.y = -Math.PI / 4;

            const baseG = new THREE.BoxGeometry(0.8, 0.3, 0.6);
            const base = new THREE.Mesh(baseG, materials.wood);
            base.position.y = 0.15;
            clockGroup.add(base);

            const midG = new THREE.BoxGeometry(0.65, 1.6, 0.5);
            const mid = new THREE.Mesh(midG, materials.wood);
            mid.position.y = 1.1;
            clockGroup.add(mid);

            const headG = new THREE.BoxGeometry(0.8, 0.7, 0.6);
            const head = new THREE.Mesh(headG, materials.wood);
            head.position.y = 2.25;
            clockGroup.add(head);

            const faceG = new THREE.CircleGeometry(0.22, 16);
            const faceMat = new THREE.MeshBasicMaterial({ color: 0xdedac8 });
            const face = new THREE.Mesh(faceG, faceMat);
            face.position.set(0, 2.25, 0.31);
            clockGroup.add(face);

            scene.add(clockGroup);
            finalSceneObjects.push(clockGroup);

            const topLight = new THREE.SpotLight(0xfffaed, 1.5, 12, Math.PI / 4, 0.5);
            topLight.position.set(0, 6, -6);
            topLight.target = chairGroup;
            scene.add(topLight);
            finalSceneObjects.push(topLight);
        }

        function triggerInteraction() {
            if (currentStage === 6) {
                const chairPos = new THREE.Vector3(0, 0, -6);
                if (playerGroup.position.distanceTo(chairPos) < 2.0) {
                    executeTerminalTransition();
                }
                return;
            }

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            const intersects = raycaster.intersectObjects(focalPoints);
            if (intersects.length > 0) {
                const item = intersects[0].object;
                if (item.userData && item.userData.type === "artifact") {
                    displayMemory(item.userData.id, item);
                }
            }
        }

        window.addEventListener('touchstart', (e) => {
            if (!isMobile || !isGameRunning) return;
            const touch = e.touches[0];
            if (touch.clientX < 180 && touch.clientY > window.innerHeight - 180) return;
            if (touch.clientX > window.innerWidth / 2) return;

            triggerInteraction();
        });

        function displayMemory(id, obj) {
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = 1;
            setTimeout(() => { flash.style.opacity = 0; }, 150);

            focalPoints = focalPoints.filter(fp => fp !== obj);
            obj.parent.remove(obj);

            const subs = document.getElementById('subtitles');
            subs.innerText = `"${MEMORIES[id]}"`;
            subs.style.opacity = 1;

            setTimeout(() => { subs.style.opacity = 0; }, 3000);
        }

        function executeTerminalTransition() {
            playerGroup.position.set(0, 1.2, -5.6);
            camera.quaternion.setFromEuler(new THREE.Euler(0, Math.PI, 0)); 
            
            moveForward = moveBackward = moveLeft = moveRight = false;
            if (isMobile) {
                document.getElementById('mobile-joystick').style.display = 'none';
            } else {
                document.exitPointerLock();
            }

            const subs = document.getElementById('subtitles');
            subs.innerText = "... Friends past reunited ...";
            subs.style.opacity = 1;

            setTimeout(() => {
                subs.style.opacity = 0;
                let fadeVol = 1.0;
                let audioInterval = setInterval(() => {
                    fadeVol -= 0.05;
                    if (fadeVol <= 0) {
                        clearInterval(audioInterval);
                        if (audioStream) audioStream.pause();
                    } else if (audioStream) {
                        audioStream.volume = fadeVol;
                    }
                }, 300);

                const overlay = document.getElementById('ui-container');
                overlay.style.display = 'flex';
                overlay.style.backgroundColor = '#000';
                overlay.style.opacity = 1;
                document.getElementById('start-screen').innerHTML = "<h1 style='color: #444; font-size: 1.2rem;'>The world has faded.</h1>";
            }, 8000);
        }

        function skipToStage(stageNum) {
            if (!isGameRunning) return;
            currentStage = stageNum;
            gameTime = (stageNum - 1) * STAGE_DURATION;
            
            clearAllChunks();
            document.getElementById('stage-title').innerText = STAGE_NAMES[stageNum];
            
            if (stageNum === 6) {
                initStage6Environment();
            } else {
                finalSceneObjects.forEach(obj => scene.remove(obj));
                finalSceneObjects = [];
                scene.fog.color.setHex(0x050505);
                scene.fog.density = 0.04;
                playerGridPos = { x: 999, z: 999 }; 
            }

            playStageAudio(stageNum);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isGameRunning) return;

            const delta = Math.min(0.1, clock.getDelta()); 
            gameTime += delta;
            
            const calculatedStage = Math.min(TOTAL_STAGES, Math.floor(gameTime / STAGE_DURATION) + 1);
            if (calculatedStage !== currentStage) {
                skipToStage(calculatedStage);
            }

            const min = Math.floor(gameTime / 60);
            const sec = Math.floor(gameTime % 60);
            document.getElementById('time-display').innerText = `Time: ${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;

            currentUp.lerp(targetUp, delta * 3.0);

            let forwardVec = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            let rightVec = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

            forwardVec.projectOnPlane(currentUp).normalize();
            rightVec.projectOnPlane(currentUp).normalize();

            direction.set(0, 0, 0);
            if (moveForward) direction.add(forwardVec);
            if (moveBackward) direction.sub(forwardVec);
            if (moveLeft) direction.sub(rightVec);
            if (moveRight) direction.add(rightVec);
            direction.normalize();

            const speedMultiplier = currentStage === 5 ? 1.5 + Math.sin(gameTime)*0.8 : 3.0; 
            velocity.addScaledVector(direction, speedMultiplier * 20.0 * delta);
            velocity.addScaledVector(velocity, -8.0 * delta); 

            playerGroup.position.addScaledVector(velocity, delta);

            if (currentStage < 4) {
                playerGroup.position.y = 1.8; 
            } else if (currentStage === 5) {
                playerGroup.position.y += Math.sin(gameTime * 0.4) * 0.003;
            }

            updateChunks();

            chunks.forEach((chunk) => {
                chunk.children.forEach((child) => {
                    if (child.userData && child.userData.type === "sliding") {
                        child.position.x = child.userData.baseX + Math.sin(gameTime * child.userData.speed) * child.userData.range;
                    }
                    if (child.userData && child.userData.type === "artifact") {
                        child.rotation.y += delta * 1.5;
                        child.rotation.x += delta * 0.5;
                    }
                    if (child.userData && child.userData.type === "gravityPad") {
                        const worldPos = new THREE.Vector3();
                        child.getWorldPosition(worldPos);
                        if (playerGroup.position.distanceTo(worldPos) < 1.0) {
                            const localDir = child.userData.dir;
                            targetGravity.copy(localDir).multiplyScalar(-1);
                            targetUp.copy(localDir);
                        }
                    }
                });
            });

            playerGroup.up.copy(currentUp);
            renderer.render(scene, camera);
        }

        initScene();
        animate();
    </script>
</body>
